body:
  text: 周易圖說卷下元錢義方撰後天演義圖凡二十謂後之聖人因已成之易推演出其義頗有改動作為者序卦傳曰有天地然後萬物生焉盈天地之間者唯萬物故受之以屯屯者盈也屯者物之始生也物生必蒙故受之以蒙蒙者蒙也物之稚也物稚不可不養也故受之以需需者飲食之道也飲食必有訟故受之以訟訟必有衆起故受之以師師者衆也衆必有所比故受之以比比者比也比必有所畜故受之以小畜物畜然後有禮故受之以履履而泰然後安故受之以泰泰者通也物不可以終通故受之以否物不可以終否故受之以同人與人同者物必歸焉故受之以大有有大者不可以盈故受之以謙有大而能謙必豫故受之以豫豫必有隨故受之以隨以喜隨人者必有事故受之以蠱蠱者事也有事而後可大故受之以臨臨者大也物大然後可觀故受之以觀可觀而後有所合故受之以噬嗑嗑者合也物不可以苟合而已故受之以賁賁者飾也致飾然後亨則盡矣故受之以剝剝者剝也物不可以終盡剝窮上反下故受之以復復則不妄矣故受之以無妄有無妄然後可畜故受之以大畜物畜然後可養故受之以頥頥者養也不養則不可動故受之以大過物不可以終過故受之以坎坎者陷也陷必有所麗故受之以離離者麗也右上篇有天地然後有萬物有萬物然後有男女有男女然後有夫婦有夫婦然後有父子有父子然後有君臣有君臣然後有上下有上下然後禮義有所錯夫婦之道不可以不久也故受之以恆恆者久也物不可以久居其所故受之以遁遁者退也物不可以終遁故受之以大壯物不可以終壯故受之以晉晉者進也進必有所傷故受之以明夷夷者傷也傷於外者必反於家故受之以家人家道窮必乖故受之以睽睽者乖也乖必有難故受之以蹇蹇者難也物不可以終難故受之以解解者緩也緩必有所失故受之以損損而不已必益故受之以益益而不已必決故受之以夬夬者決也決必有所遇故受之以姤姤者遇也物相遇而後聚故受之以萃萃者聚也聚而上者謂之升故受之以升升而不已必困故受之以困困乎上者必反下故受之以井井道不可不革故受之以革革物者莫若鼎故受之以鼎主器者莫若長子故受之以震震者動也物不可以終動止之故受之以艮艮者止也物不可以終止故受之以漸漸者進也進必有所歸故受之以歸妹得其所歸者必大故受之以豐豐者大也窮大者必失其居故受之以旅旅而無所容故受之以巽巽者入也入而後說之故受之以兑兌者說也說而後散之故受之以渙渙者離也物不可以終離故受之以節節而信之故受之以中孚有其信者必行之故受之以小過有過物者必濟故受之以既濟物不可窮也故受之以未濟終焉右下篇愚按繫辭言易之興也其於中古乎作易者其有憂患乎而繼以履謙復恆損益困井巽之九卦皆循序卦原列之次此又文王之易之一證也以上一圖乃文王推演之義右一圖正文王之易所以為後天之學開卷第一義者邵子不知本此而乃以意主張說卦所謂帝出乎震至成言乎艮者屬之文王過矣此見於文王周公卦爻之經孔子彖象文言之傳其所謂象或就八卦取或就六畫成卦全體取或就爻之剛柔位之隂陽取或以內外乘承應與互體取初無有一定之則而或者乃槩以分屬八卦謬矣以上一圖乃文王周公孔子相繼推演之義右所謂象已非伏羲之所謂象矣伏羲之象全無文字未有假借比並只本卦中竒偶之畫便是繫辭所謂象者像是也今此之象又是向下一節說話也是有注腳了後八卦性情圖象圖放此繫辭傳曰易之為書也原始要終以為質也六爻相雜唯其時物也其初難知其上易知本末也初辭擬之卒成之終若夫雜物撰德辨是與非則非其中爻不備朱子曰先儒解此多以為互體如屯卦震下坎上就中間四爻觀之自二至四為坤自三至五為艮故曰非其中爻不備互體漢儒多用之左傳中一處說占得觀卦處亦舉得分明看來此說亦不可廢愚按左傳莊公二十二年陳侯筮遇觀之否風為天於土上山也杜氏注謂此互體正卦三四五為艮變卦二三四為艮竊謂全易六十四卦唯乾坤二卦不可互體餘六十二卦皆可互體此古占法今人少用故今特以觀之否正變二卦發例而餘可以類推云以上一圖之用不詳自何時始夫包羲之時易雖有占象示而已辭且未有惡有互體互體之用日復趨巧此必周公繫爻以後孔子十翼以前之事故今以附卦爻象圖之後云說卦傳曰乾健也坤順也震動也巽入也坎陷也離麗也艮止也兑說也朱子曰此言八卦之性情又曰謂之性者言其性如此又謂之情者言其發用處亦如此又曰陽在下為震震動也在上為艮艮止也陽在下自動在上自止又曰陽是動底物事隂是靜底物事凡陽在下便是震動意思在中便是陷在二隂之中在上則沒去處了只得止隂是柔順底物事在下則巽順隂柔不能自立須附於陽在中則是附麗之象在上則說蓋柔媚之物在上則歡悅右雖伏羲本圖然伏羲之易卦畫之外别無文字但有文字注釋即是後天推演之說故著于此下象圖放此說卦傳曰天地定位山澤通氣雷風相薄水火不相射八卦相錯數往者順知來者逆是故易逆數也邵子曰乾南坤北離東坎西震東北兑東南巽西南艮西北自震至乾為順自巽至坤為逆於是八卦相交而成六十四卦又曰乾坤縱而六子橫易之本也朱子曰以橫圖觀之有乾一而后有兑二有兑二而后有離三有離三而后有震四有震四而巽五坎六艮七坤八亦以次而生焉此易之所以成也而圎圗之左方自震而厯離兑以至於乾之末皆進而得其已生之卦猶自今日而追數昨日也故曰數往者順其右方自巽而厯坎艮以至於坤之末皆進而得其未生之卦猶自今日而逆計來日也故曰知來者逆然本易之所以成則其先後始終如橫圖及圎圖右方之序而已故曰易逆數也又曰橫圖據見在底畫較自然圎圖便是就中間拗做兩截恁地轉來底是竒恁地轉去底是偶有些造作不依他元初畫底邵子曰先天學心法也故圗皆自中起萬事萬化生於心也又曰圗雖無文吾終日言而未嘗離乎是蓋天地萬物之理盡在其中矣右二圗邵子以為伏羲先天之學以愚觀之恐有未然蓋乾兑離震四卦及其外三十二卦皆循伏羲畫卦本然之次第巽坎艮坤四卦及其外三十二卦皆反伏羲元畫之卦序朱子所謂就中間拗做兩截有些造作不依他元初畫底是已然左右各三十二卦隂陽對待截然整齊又如此非吾夫子不能為之也說卦傳曰帝出乎震齊乎巽相見乎離致役乎坤說言乎兑戰乎乾勞乎坎成言乎艮萬物出乎震震東方也齊乎巽巽東南也齊也者言萬物之潔齊也離也者明也萬物皆相見南方之卦也聖人南面而聽天下嚮明而治蓋取諸此也坤也者地也萬物皆致養焉故曰致役乎坤兑正秋也萬物之所說也故曰說言乎兑戰乎乾乾西北之卦也言隂陽相薄也坎者水也正北方之卦也勞卦也萬物之所歸也故曰勞乎坎艮東北之卦也萬物之所成終而所成始也故曰成言乎艮邵子曰至哉文王之作易也其得天地之用乎故乾坤交而為泰坎離交而為既濟也乾生於子坤生於午坎終於寅離終於申以應天之時也置乾於西北退坤於西南長子用事而長女代母坎離得位而兑艮為偶以應地之方也王者其盡於是矣又曰震兑橫而六卦縱易之用也朱子曰震東兑西者陽主進故以長為先而位乎左隂主退故以少為貴而位乎右也坎北者進之中也離南者退之中也男北而女南者互藏其宅也四者皆當四方之正位而為用事之卦然震兑始而坎離終震兑輕而坎離重也乾西北坤西南者父母既老而退居不用之地也然母親而父尊故坤猶半用而乾全不用也艮東北巽東南者少男進之後而長女退之先故亦皆不用也然男未就傅女將有行故巽稍向用而艮全未用也四者皆居四隅不正之位然居東者未用而居西者不復用也右邵子以為文王之學相承傳信久矣然於易之經傳未見其所本之的不若直以為孔子推演之義為無可議耳卦辭經曰坤元亨利牝馬之貞又曰離畜牝牛又曰艮其背大象傳曰明兩作離繫辭傳曰八卦成列象在其中矣說卦傳曰乾為馬坤為牛震為龍巽為雞坎為豕離為雉艮為狗兑為羊又曰乾為首坤為腹震為足巽為股坎為耳離為目艮為手兑為口又曰乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兑三索而得女故謂之少女又曰乾為天為圜為君為父為玉為金為寒為冰為大赤為良馬為老馬為瘠馬為駁馬為木果坤為地為母為布為釜為吝嗇為均為子母牛為大輿為文為衆為柄其於地也為黑震為雷為龍為𤣥黃為敷為大塗為長子為決躁為蒼筤竹為萑葦其於馬也為善鳴為馵足為作足為的顙其於稼也為反生其究為健為蕃鮮巽為木為風為長女為繩直為工為白為長為髙為進退為不果為臭其於人也為寡髮為廣顙為多白眼為近利市三倍其究為躁卦坎為水為溝瀆為隱伏為矯輮為弓輪其於人也為加憂為心病為耳痛為血卦為赤其於馬也為美脊為亟心為下首為薄蹄為曳其於輿也為多眚為通為月為盜其於木也為堅多心離為火為日為電為中女為甲胄為戈兵其於人也為大腹為乾卦為鱉為蟹為螺為蚌為龜其於木也為科上稿艮為山為徑路為小石為門闕為果蓏為閽寺為指為狗為鼠為黔喙之屬其於木也為堅多節兑為澤為少女為巫為口舌為毁折為附決其於地也為剛鹵為妾為羊右雖本天地定位之列然乾之為寒為冰離之為火為雉巽之為木坎之為水其類不一又取帝出乎震之列故附於此云說卦傳曰乾天也故稱乎父坤地也故稱乎母震一索而得男故謂之長男巽一索而得女故謂之長女坎再索而得男故謂之中男離再索而得女故謂之中女艮三索而得男故謂之少男兊三索而得女故謂之少女朱子曰巽離兑乾之所索乎坤者震坎艮坤之所索乎乾者又曰一索再索之說初間畫卦時也不是恁地只畫成八卦後便有此象耳說卦傳曰雷以動之風以散之雨以潤之日以烜之艮以止之兊以說之乾以君之坤以藏之朱子曰雷以動之四句取象義多故以象言艮以止之四句取卦義多故以卦言蔡氏曰動則物萌散則物具二者言生物之功也潤則物滋烜則物舒二者言長物之功也止則物成說則物遂二者言收物之功也君則物有所歸藏則物有所息二者言藏物之功也愚按此八卦之用聖人從中二卦說起以次而至在外之二卦然必先雷而後風先雨而後日先艮而後兑先乾而後坤者震坎艮乾皆陽卦巽離兑坤皆隂卦先陽後隂之義也繫辭傳曰易之為書也廣大悉備有天道焉有人道焉有地道焉朱子曰三畫已具三才繫辭傳曰六爻之動三極之道也又曰兼三才而兩之故六六者非他三才之道也說卦傳曰立天之道曰隂與陽立地之道曰柔與剛立人之道曰仁與義兼三才而兩之故易六畫而成卦朱子曰六爻初二為地三四為人五上為天三才各一太極也又曰初剛而二柔三仁而四義五陽而上隂兩之言加一倍本是一箇各加一箇為兩又曰隂陽以氣言柔剛以質言仁義以理言又曰隂陽成象天道之所以立也剛柔成質地道之所以立也仁義成德人道之所以立也道一而已隨事著見故有三才之别而於其中又各有體用之分焉其實則一太極也六虛分隂分陽圖隂陽隂陽隂陽上五四三二初此六者爻之虛位繫辭傳曰易之為書也不可逺為道也屢遷變動不居周流六虛說卦傳曰分隂分陽迭用柔剛故易六位而成章愚按未揲蓍時卦爻未辨自初至上皆為虛位然初三五竒數而為陽二四上偶數而為隂已有定而成文矣既揲蓍後卦爻已著則或以剛居陽或以剛居隂或以柔居隂或以柔居陽更迭用其剛柔而成文益可見也復象傳曰雷在地中復先王以至日閉關商旅不行后不省方此特因至日一辭推廣之而以隂陽消息往復不窮為之序與六十四卦圓圗位序不同蓋並行而不相悖者也復象傳曰雷在地中復先王以至日閉關商旅不行后不省方而邵子復卦之辭曰冬至子之半天心無改移一陽初動處萬物未生時𤣥酒味方淡大音聲正希此言如不信更請問包犧愚按此圖稽之經傳他無可見特以至日一辭推廣之而得其大槩如此耳而玉齊胡氏乃以六十四卦分配二分二至四位各兩卦外十六氣各三卦合之為六十四卦夫節氣周於天卦象周於圖本無間也而何有於兩卦三卦多少之分哉吁泥矣雜卦傳曰乾剛坤柔比樂師憂臨觀之義或與或求屯見而不失其居蒙雜而著震起也艮止也損益盛衰之始也大畜時也無妄災也萃聚而升不來也謙輕而豫怠也噬嗑食也賁無色也兊見而巽伏也隨無故也蠱則飭也剝爛也復反也晉晝也明夷誅也井通而困相遇也咸速也恆久也渙離也節止也解緩也蹇難也睽外也家人內也否泰反其類也大壯則止遁則退也大有衆也同人親也革去故也鼎取新也小過過也中孚信也豐多故也親寡旅也離上而坎下也小畜寡也履不處也需不進也訟不親也大過顛也姤遇也柔遇剛也漸女歸待男行也頥養正也既濟定也歸妹女之終也未濟男之窮也夬決也剛決柔也君子道長小人道憂也朱子曰易上經始乾坤而終坎離下經始艮兑震巽而終坎離上經反對凡十八卦下經反對亦十八卦或問雜卦反對之義只是反覆則其吉凶禍福動靜剛柔皆反了朱子曰是如此問乾坤大過頥坎離中孚小過八卦番覆不成别卦是如何朱子曰八卦只是六卦乾坤坎離是四正卦兑便是番轉來底巽卦震便是番轉來底艮卦六十四卦只八卦是正卦餘便只二十八卦番轉為五十六卦又曰三畫之卦只是六卦即六畫之卦以正卦八加反卦二十八為三十有六六六三十六也邵子謂之暗卦小成之卦八即大成之卦六十四八八六十四也三十六與六十四同訟彖傳曰剛來而得中隨彖傳曰剛來而下柔蠱彖傳曰剛上而柔下噬嗑彖傳曰柔得中而上行賁彖傳曰柔來而文剛故亨分剛上而文柔故小利有攸往無妄彖傳曰剛自外來而為主於內大畜彖傳曰剛上而尚賢咸彖傳曰柔上而剛下恆彖傳曰剛上而柔下晉彖傳曰柔進而上行睽彖傳曰柔進而上行得中而應乎剛升彖傳曰柔以時升鼎彖傳曰柔進而上行得中而應乎剛渙彖傳曰柔得位乎外而上同愚按此十有四卦之彖傳朱子本義以卦變釋之其所謂變乃是就卦爻之曰上曰下曰來曰進曰升曰得位而謂之變與揲蓍求卦陽變隂隂變陽者不同也程子於此謂卦之變皆自乾坤來朱子譏其於三陽三隂之卦可通而隂陽多少者不可通是矣然其自為說則泥以剛柔之切近者為變是亦有不可通矣竊謂六十四卦已成之後隂陽之畫參差不齊秩然可見演易聖人於其中或指其一剛一柔之上下或専指其一爻之得位而加以曰來曰上曰進曰升之辭隨時取義而實無一定之拘非可執一端之說以律之也說卦傳曰神也者妙萬物而為言者也動萬物者莫疾乎雷撓萬物者莫疾乎風燥萬物者莫熯乎火說萬物者莫說乎澤潤萬物者莫潤乎水終萬物始萬物者莫盛乎艮故水火相逮雷風不相悖山澤通氣然後能變化既成萬物也朱子曰此去乾坤而専言六子以見神之所為愚按繫辭傳曰隂陽不測之謂神張子曰兩在故不測巽離兊乾交於坤而得於坤也震坎艮坤交於乾而得於乾也隂卦必有陽陽卦必有隂此隂陽之兩在即乾坤之所以為神也繫辭傳曰陽卦多隂隂卦多陽其故何也陽卦竒隂卦偶其德行何也陽一君而二民君子之道也隂二君而一民小人之道也愚按此以隂陽分君子小人非謂卦有君子小人之别也以上一十六圖皆孔子推演之義右一十六圖或循伏羲原畫之卦次或即原畫之卦而别為之說或即原畫之次而改易用之千變萬化無所不通莫非道妙之呈露亦可以見吾聖人心與造化流通無間之妙矣蓋伏羲之易止為卜筮而設而文王周公之卦爻經孔子之彖大小象文言傳實充廣之至此一十六圖却不盡繫於占筮只是因伏羲之卦而推演出許多義理耳先儒見其天地定位帝出乎震二章卦位有不同於是以其一歸之伏羲一歸之文王若使當時一十六圖之盡具不知其餘又當屬之何人也邵子大易吟曰天地定位否泰反類山澤通氣損咸見義雷風相薄恆益起意水火相射既濟未濟四象相交成十六事八卦相蕩為六十四朱子曰康節天地定位否泰反類詩八句是說方圖中兩交股底且如西北角乾東南角坤是天地定位便對東北角泰西南角否次乾是兑次坤是艮便對次否之咸次泰之損後四卦亦如是共十六卦只曰方圖自西北之東南便是自乾以之坤自東北之西南便是由泰以之否其間有咸恆損益既濟未濟所以又於此八卦見義蓋為是自兩角尖射上與乾坤相對不知怎生恁地巧愚按邵子此圖雖不見於聖人之經傳然實因橫圖而以乾兑離震巽坎艮坤自下而上重疊加之而八卦之上復各有八卦者自仍其舊於是乾坤艮兑坎離震巽交而為泰否咸損既濟未濟恆益者其相對整然如此亦猶橫圖中判摺轉其半規為圎圖而卦爻隂陽相對整然也是圖也所謂發前聖之未發者而非漢魏儒者穿鑿附會為圖者之所可企及也今特以其不見於經傳附之於此云以上一圖乃邵子推演之義周易圖說卷下
