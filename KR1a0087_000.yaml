body:
  text: 周易圖説易類提要臣等謹案周易圖説二卷元錢義方撰義方字子宜湖州人嘗舉進士其仕履則不可考矣是書成于至正六年上卷為圖者七下卷為圖者二十朱彞尊經義考作一卷疑傳寫誤也其説謂河圖為作易之本大傳云河出圖洛出書聖人則之乃聖人即理推數二者可以相通故並言之非謂作易兼取洛書又引朱子之説謂圓圖有造作且欲挈出方圖在圓圖之外又謂朱子易本義於先天後天卦位必歸其説於邵子似歉然有所未足是以不揆其陋而有所述云云其書較他家為近理然猶據陳摶以來相傳之圖書言之其實河圖洛書雖見經傳而今之五十五㸃四十五㸃兩圖其為古之圖書與否則經傳絶無顯證援左傳有三墳而謂即毛漸之書援周禮有連山歸藏而謂即劉炫之書考古者其疑之矣且繫辭言洛書不言即九疇洪範言九疇不言即洛書盧辯注大戴禮記始云明堂九室法龜文其説起于後周阮逸偽作闗朗易傳因而述之于是洛書之文始傳為四十五㸃而九疇亦遂併于易義方知九疇之非易而不知洛書本非九疇其辨猶為未審至其謂自漢以來惟孟喜本易緯稽覽圖推易離坎震兑各主一方餘六十卦每卦主六日七分為有圖之始寥寥千載至陳摶始本易有太極兩儀四象八卦因而重之及天地定位等説為横圓大小四圖傳穆李以及邵子又本帝出乎震之説為後天圓圖因大横圖之卦為否泰反類方圖則於因易而作圖非因圖而作易本末源流粲然明白不似他家務神其説直以為古聖之制作可謂獨識其真矣其所演二十七圖亦即因舊圖而變易之竒偶之數愈推愈有人自為説而其理皆通譬之自古至今奕無同局固亦不妨存備一家焉乾隆四十四年四月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀周易圖説原序錢子既作易圖説或問之曰易之有圖尚矣今子之作不盡合先儒之説何也余應之曰求合於聖人之㫖則先儒之合乎聖人者取之異乎聖人者正之以聖人之説此所以不盡合也或又問曰昔之述河圖者必並陳洛書子獨不然何也余又應之曰河圖者伏羲所取而用之洛書之出則在乎千有餘年之後吾聖人兼而取之不過以龍龜負文以出河洛者其事同聖人則之以開物成務其用亦同而即理推數二者又可以相通故並言之耳非謂作易兼取洛書也余為明易而本之河圖其不及洛書宜矣嗚呼六經之道如日行天萬古一日秦火之變易獨以卜筮得全傳之者雖衆知之者盖寡自漢孟喜本易緯稽覽圖推易離坎震兑各主一方餘六十卦每卦主六日七分此易有圖之始也寥寥千載易學絶響宋之陳摶心領神悟始本吾聖人易有太極兩儀四象八卦因而重之及天地定位等説為横圓大小四圖傳之穆李以及邵子而又本帝出乎震之説為後天圓圖因大横圖之卦為否泰反類方圖於是易之有圖始大明於天下而朱子尚有圓圖有造作不依他元初畫底之説且欲挈出方圖在圓圖之外而釋天地定位帝出乎震者必曰邵子曰此伏羲八卦之位此卦位乃文王所定似猶有歉然未滿之意然其釋河圖之則猶未免惑於孔安國之説此愚所以不揆其陋而有所述也揚子雲曰衆言淆亂折諸聖苟無聖人之書而臆度為之顧余何人而敢與先儒立異同哉且愚伏讀易之經傳而學之三十年矣苟非反覆潛玩而有所自得亦豈敢遽為此書觀者幸恕其僣而嘉其用心可也至正六年龍集丙戌夏四月甲子前進士吳興錢義方子宜父序
