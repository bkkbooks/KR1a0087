  text: 欽定四庫全書
  hash: sha256:64d9ff2e7643d8cd3464e7f4c9e75c7d6d85eb6ee80c540d6dcbeeab187b9ddc
  markers:
  - {type: page-break, offset: 0, content: '', id: KR1a0087_WYG_001-1a, image: WYG0026/WYG0026-0620a.png}
body:
  text: 周易圖説卷上元錢義方撰本㫖圖凡七謂聖人作易其本㫖如此繫辭傳曰易有太極是生兩儀兩儀生四象四象生八卦又曰八卦成列象在其中矣又曰古者包犧氏之王天下也仰則觀象於天俯則觀法於地觀鳥獸之文與地之宜近取諸身逺取諸物於是始作八卦以通神明之徳以類萬物之情則伏羲所以畫八卦乃得之仰觀俯察近取逺取盖在天地在人物莫不有理莫不有隂陽莫不有生生不窮之妙其所以為太極兩儀四象八卦者的確詳明曉然易見包犧模寫於書以示人非假纎毫私智穿鑿成之者周子所謂太極動而生陽動極而靜靜而生隂靜極復動一動一靜互為其根邵子所謂一分為二二分為四四分為八程子所謂加一倍法者是也自漢孔安國劉歆以為伏羲則河圖畫八卦傳襲既久世以為信賢如朱子亦謂虚五與十者太極竒偶數各二十者兩儀以一二三四為六七八九者四象析四方之合為乾坤離坎補四隅之空為兑震巽艮者八卦言兩儀四象通矣而言八卦則析四方之合補四隅之空所以為乾坤離坎兑震巽艮者皆未見灼然之法象而能使人釋然無疑者然朱子本義嘗謂伏羲仰觀俯察見隂陽有竒偶之數故畫一竒以象陽畫一偶以象隂見一隂一陽有各生一隂一陽之象故有下而上再倍而三以成八卦原象篇又謂惟皇昊羲仰觀俯察竒偶既陳兩儀斯設既幹乃支一各生兩隂陽交錯以立四象兩一既分一復生兩三才在目八卦指掌感興詩又謂皇羲古神聖妙契一俯仰不待窺馬圖人文已宣朗附録又謂仰觀俯察逺求近取安知河圖非其中之一事得非啟蒙之書已行而晚年始悟其失遂不及改歟聖人之則河圖盖謂揲蓍非謂畫卦也詳見下河圖説或問朱子曰伊川先生見兔曰察此可以畫卦便是此義曰就這一端上亦可以見凡草木禽獸無不有隂陽鯉魚脊上三十六鱗隂數龍脊上八十一鱗陽數又龜背上文中間一簇成五段五行也兩邊各插四段共成八段八卦也兩邊周圍共有二十四段二十四氣也箇箇如此又如草木之有雌雄銀杏桐楮牝牡麻竹之類亦然愚按天陽也而有日月則日陽月隂也地隂也而有山川則山隂川陽也人物之男者為陽然交於隂則可以生男可以生女女者為隂然交於陽則可以生女可以生男朱子所謂隂陽各生一隂一陽之謂而此圖兩儀生四象四象生八卦之謂也此聖人仰觀俯察近取逺取畫卦之最親切而明白者又何待於傅㑹牽合而后成之邪其不主於則河圖也亦明矣繫辭傳曰八卦成列象在其中矣因而重之爻在其中矣朱子曰下三畫即前圖之八卦上三畫則各以序重之而下卦因亦各衍而為八也若逐爻漸生則邵子所謂八分為十六十六分為三十二三十二分為六十四者也又曰兩儀未分渾然太極而兩儀四象八卦六十四卦之理已粲然於其中太極分而兩儀則太極固太極兩儀固兩儀也兩儀分而四象則兩儀又為太極四象又為兩儀矣自是而推四而八八而十六十六而三十二三十二而六十四以至於百千萬億之無窮其已定之形已成之勢不容毫髮思慮作為其間也又曰第四畫者以八卦為太極而復生之兩儀也第五畫者八卦之四象也第六畫者八卦之八卦也邵子曰太極既分兩儀立矣陽上交於隂隂下交於陽而四象生矣陽交於隂隂交於陽而生天之四象剛交於柔柔交於剛而生地之四象八卦相錯而後萬物生焉是故一分為二二分為四四分為八八分為十六十六分為三十二三十二分為六十四猶根之有榦榦之有枝愈大則愈小愈細則愈繁以上二圖專論畫卦乃伏羲作易之本繫辭傳曰河出圖洛出書聖人則之又曰天一地二天三地四天五地六天七地八天九地十天數五地數五五位相得而各有合天數二十有五地數三十凡天地之數五十有五此所以成變化而行鬼神也大衍之數五十其用四十有九分而為二以象兩掛一以象三揲之以四以象四時歸竒於扐以象閏五嵗再閏故再扐而後掛愚嘗攷之吾聖人所謂河出圖洛出書聖人則之者言聖人則之而已未嘗指言則為何事也自漢孔安國劉歆皆謂伏羲則河圗以畫八卦後世遂信其説相承而不悟賢如朱子亦未免曲説求之而卒不可通夫伏羲所自畫卦與夫則河圖之用愚己論之於前矣且繫辭既明有天一至地十之數大衍五十之説而朱子易圖説亦以天一地二章繼聖人則之之後則聖人則河圖以揲蓍者至甚明白而無可疑也故天一地二章之本義曰此言天地之數陽竒隂偶即所謂河圖者也其位一六居下二七居上三八居左四九居右五十居中就此章而言則中五為衍母次十為衍子次一二三四為四象之位六七八九為四象之數也若夫洛書則蔡元定之論詳矣故不復贅朱子曰其所以為數者不過一隂一陽一竒一偶以兩其五行而已所謂天者陽之輕清位乎上者也所謂地者隂之重濁位乎下者也陽數竒故一三五七九皆屬乎天所謂天數五也隂數偶故二四六八十皆屬乎地所謂地數五也天數地數各以類而相求所謂五位之相得者然也天以一生水而地以六成之地以二生火而天以七成之天以三生木而地以八成之地以四生金而天以九成之天以五生土而地以十成之又其所謂有合者也積五竒而為二十五積五偶而為三十合是二者而為五十五此河圗之全數夫子之意而諸儒之説也竊謂孔安國於易舛誤不一如繫辭論尚象制器凡十三卦網罟一事是包犧耒耜交易二事是神農垂衣至書契九事是黄帝堯舜極其分明而安國序書乃以黄帝堯舜之書契歸之於包犧亦猶吾聖人言包犧仰觀俯察作八卦而安國以為則河圖作八卦也劉歆不過信安國之説而踵為之論耳然安國誤於前歆誤於後人之信之千古一律安國誠易之罪人矣善乎揚子之言曰衆言淆亂折諸聖愚之説一以聖人十翼之言折之耳繫辭傳曰大衍之數五十其用四十有九分而為二以象兩掛一以象三揲之以四以象四時歸竒於扐以象閏五嵗再閏故再扐而後掛説卦傳曰昔者聖人之作易也幽贊於神明而生蓍參天兩地而倚數朱子曰大衍之數五十而蓍一根百莖可當大衍之數者二故揲蓍之法取五十莖為一握置其一不用以象太極而當用之䇿凡四十有九盖兩儀體具未分之象也又曰大衍之數五十盖以河圖中宫天五乗地十而得之至用以筮則又止用四十有九盖皆出於理勢之自然而非人之智力所能損益也兩謂天地也掛懸其一於左手小指之間也三三才也揲間而數之也竒所揲四數之餘也扐勒於左手中三指之兩間也閏積月之餘日而成月者也五嵗之間再積日而再成月故五嵗之中凡有再閏然後别起積分如一掛之後左右各一揲而一扐故五者之中凡有再扐然後别起一掛也又曰一變所餘之䇿左一則右必三左二則右亦二左三則右必一左四則右亦四通掛一之䇿不五則九除掛一則為四為八四以四約之為一故為竒八以四約之為二故為偶二變三變所餘之䇿左一則右必二左二則右必一左三則右必四左四則右必三通掛一之䇿不四則八又曰四五為少八九為多又曰天圓地方圎者一而圍三三各一竒故參天而為三方者一而圍四四合二偶故兩地而為二數皆倚此而起故揲蓍三變之餘三竒則三三而九三偶則三二而六兩二一三則為七兩三一二則為八愚按揲蓍所餘凡四為竒凡八為偶少者為竒多者為偶盖蓍以四莖而揲故所餘之䇿亦必以四約之而一其四者為奇二其四者為偶然倚為七八九六之數則四之竒者以三計之取天圎徑一圍三參其天圎之徑而得三之象八之偶者以二計之取地方徑一圍四兩其地方之徑而得二之象方其掛扐則四為竒八為偶及其倚數則四為三八為二又按以㸃計數猶歴家之以度測天也易本無是法後人不得已而為是以别白之耳下放此繫辭傳曰四營而成易十有八變而成卦朱子曰易變也三變成爻十有八變則成六爻此圖所謂三變成爻之象也夫隂陽竒偶生生謂易而成卦六十有四蓍扐竒偶三變成爻而成形亦六十有四其數之自相符合盖造化巧妙有如此者以上三圖専論揲蓍乃伏羲教人用易之法爻辭經所謂初二三四五上之九六是也聖人則圗揲蓍以一二三四為四象之位六七八九為四象之數陽主進七進未極而九進已極極則退而後變為少隂之八隂主退八退未極而六退已極極則進而復變為少陽之七易用其變所以應天下萬事之變此所以老變少不變用九六而不用七八也愚按古者揲蓍得卦其六爻之中雖有老陽少隂少陽老隂六七八九之殊然其爻象只是竒偶二畫而人自辨其為老為少變與不變而已後世又創為重􅄲拆􅅀單乂交之象以别隂陽老少之四象則又名竒以單名偶以拆而屬之二少復立重交二象而名其二者似略易見然非古法矣爻辭經曰用九見羣龍无首吉又曰用六利永貞歐陽子曰乾坤之用九用六何謂也曰乾爻七九坤爻六八九六變而七八無為易道占其變故以其所占者名爻不謂六爻皆九六也及其筮也七八常多而九六常少有無九六者焉此不可以不釋也六十四卦皆然特於乾坤見之則餘可知耳愚謂揲蓍得卦有六爻皆不變者有六爻皆變者有一爻二爻三爻四爻五爻變者故一卦可變為六十三卦通本卦為六十四卦總六十四本卦於各卦所變六十三卦計四千九十六卦然其實依舊只是六十四卦今特以乾一卦發例餘六十三卦自可以類而推之盖變之在圖者雖以次第整齊之如此而其得於蓍者乃是從本卦徑得所變之卦實不拘此先後次第也愚按一卦變六十四卦自漢儒焦貢始發其義然焦貢所作易林之書每卦之變為六十四辭以斷之如神廟籖語相似是每卦真有六十四卦而實為四千九十六卦於聖人卦變分合往復之妙懵然不識也可笑甚矣以上二圖専論因蓍得卦之用右七圖皆伏羲先天之學易之本㫖而周公發明之於經吾聖人發明之於傳有象而未有辭也吾聖人所謂易者象也象也者像也所謂聖人立象以盡意設卦以盡情偽所謂開物成務冒天下之道聖人以通天下之志以定天下之業以斷天下之疑周子所謂聖人之精畫卦以示者是也盖上古鴻荒之世人心天理未嘗相離事至物来吉㐫自判下迨結繩以記事作易以示象則世道一變之始人心天理相離之一初聖人盖有不得已焉者而後作易也易之體用雖可具見而當時占决之斷不可復攷矣至於文王周公之繫辭孔子之十翼則又世道人心之再變而即象以示人者明白於辭以告人而後世復有不悟其理者噫周易圖説卷上
